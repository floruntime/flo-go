kind: Workflow
name: order-processing
version: "1.2.0"

start:
  run: "@actions/validate-payment"
  transitions:
    success: charge
    failure: rejected

steps:
  charge:
    run: "@actions/process-payment"
    retry:
      maxAttempts: 3
      backoffMs: 1000
    transitions:
      success: fulfill
      failure: rejected

  fulfill:
    run: "@actions/fulfill-order"
    transitions:
      success: notify
      failure: manual_review

  notify:
    run: "@actions/send-confirmation"
    transitions:
      success: flo.Completed
      failure: flo.Failed

  rejected:
    run: "@actions/send-rejection"
    transitions:
      success: flo.Completed
      failure: flo.Failed

  manual_review:
    waitForSignal:
      type: "review_decision"
      timeoutMs: 86400000
      onTimeout: flo.Failed
    transitions:
      success: fulfill
      failure: rejected
