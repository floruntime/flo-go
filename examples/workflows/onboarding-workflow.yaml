kind: Workflow
name: user-onboarding
version: "2.0.1"

start:
  run: "@actions/send-verification-email"
  transitions:
    success: wait_verification
    failure: flo.Failed

steps:
  wait_verification:
    waitForSignal:
      type: "email_verified"
      timeoutMs: 86400000
      onTimeout: expired
    transitions:
      success: create_profile
      failure: flo.Failed

  create_profile:
    run: "@actions/create-user-profile"
    transitions:
      success: welcome
      failure: flo.Failed

  welcome:
    run: "@actions/send-welcome-pack"
    transitions:
      success: flo.Completed
      failure: flo.Failed

  expired:
    run: "@actions/cleanup-pending-user"
    transitions:
      success: flo.Completed
      failure: flo.Failed
